name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Prepare deploy directory
        run: |
          mkdir -p _site
          cp -r dist _site/dist
          cp index.html _site/
          cp privacidade.html _site/
          cp CNAME _site/
          cp robots.txt _site/
          cp sitemap.xml _site/
          cp -r images _site/images 2>/dev/null || true
          cp -r assets _site/assets 2>/dev/null || true

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
